# Fully local stack. Nothing leaves the machine.
#
#   ollama : the local model server. Weights persist in the named volume
#            `ollama_models`, pulled at runtime (not baked into any image).
#   app    : our pipeline. Talks to ollama over the internal network only.
#
# Usage:
#   docker compose up --build          # runs the agent loop, writes ./output
#   docker compose run --rm app python src/cmd/visualize.py --deep   # ad-hoc commands
#   docker compose run --rm app python src/cmd/analyze.py            # fixed pipeline, no agent
#
# GPU: uncomment the `deploy` block under `ollama` if you have NVIDIA + toolkit.

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama       # model weights persist here
    ports:
      - "11435:11434"                      # optional: reach it from the host too, on
                                            # 11435 so it doesn't clash with a native
                                            # `ollama serve` already using 11434
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5vl:7b          # vision engine — reads the images
      OLLAMA_AGENT_MODEL: meditron:7b    # text-reasoning — synthesizes the final report
    volumes:
      - ./mri_test_data:/app/mri_test_data:ro   # data stays read-only
      - ./output:/app/output                    # reports land here on the host

volumes:
  ollama_models:
